<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Welcome to Savana Oasis Property Ltd. — premium real estate and elegant living." />
  <title>Welcome | Savana Oasis Property Ltd.</title>
  <style>
    :root {
      --gold: #caa56a;
      --gold-soft: #ead7b1;
      --text: #f7f7f7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, serif;
      background: #050505;
      color: var(--text);
      overflow: hidden;
    }

    .welcome {
      position: relative;
      min-height: 100vh;
      background:
        linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.76)),
        url("../Live the dream in stunning overwater bungalows….jpg") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 820px;
      animation: fadeUp 1s ease-out forwards;
    }

    .badge {
      display: inline-block;
      margin-bottom: 1rem;
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: var(--gold-soft);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.85rem;
      background: rgba(0, 0, 0, 0.2);
    }

    .content h1 {
      font-size: clamp(2.4rem, 5vw, 4.2rem);
      margin-bottom: 0.9rem;
      letter-spacing: 1px;
    }

    .content p {
      font-size: 1.12rem;
      margin-bottom: 1.8rem;
      color: rgba(255, 255, 255, 0.88);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 0.9rem 1.6rem;
      border-radius: 999px;
      font-weight: bold;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .btn.primary {
      background: var(--gold);
      color: #111;
      box-shadow: 0 12px 26px rgba(202, 165, 106, 0.25);
    }

    .btn.secondary {
      border: 1px solid var(--gold);
      color: #fff;
      background: rgba(255, 255, 255, 0.04);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .content p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <section class="welcome">
    <div class="content">
      <span class="badge">Premium real estate experience</span>
      <h1>Welcome to Savana Oasis Property Ltd.</h1>
      <p>Discover elegant homes, trusted guidance, and property opportunities designed for lasting value.</p>
      <div class="actions">
        <a href="index.html" class="btn primary">Enter Site</a>
        <a href="contact.html" class="btn secondary">Contact Us</a>
      </div>
    </div>
  </section>
</body>
</html>
